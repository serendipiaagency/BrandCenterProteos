<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Cambiar Contraseña - Brand Portal</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 500px;
      width: 100%;
      padding: 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
    }

    .logo {
      font-size: 3rem;
      color: #667eea;
      margin-bottom: 1rem;
    }

    .title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      font-size: 0.875rem;
      color: #6b7280;
      line-height: 1.6;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .password-requirements {
      background: #f3f4f6;
      border-left: 4px solid #667eea;
      padding: 0.75rem;
      border-radius: 8px;
      font-size: 0.875rem;
      color: #4b5563;
      margin-bottom: 1.5rem;
    }

    .password-requirements ul {
      margin-left: 1.5rem;
      margin-top: 0.5rem;
    }

    .password-requirements li {
      margin-bottom: 0.25rem;
    }

    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-submit:active {
      transform: translateY(0);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .back-link {
      text-align: center;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid #e5e7eb;
    }

    .back-link a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    .back-link a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      min-width: 300px;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .notification.success {
      background: #10b981;
      color: white;
    }

    .notification.error {
      background: #ef4444;
      color: white;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .password-strength {
      height: 4px;
      background: #e5e7eb;
      border-radius: 2px;
      margin-top: 0.5rem;
      overflow: hidden;
    }

    .password-strength-bar {
      height: 100%;
      transition: all 0.3s;
      border-radius: 2px;
    }

    .strength-weak { width: 33%; background: #ef4444; }
    .strength-medium { width: 66%; background: #f59e0b; }
    .strength-strong { width: 100%; background: #10b981; }

    .password-match {
      font-size: 0.75rem;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .password-match.match {
      color: #10b981;
    }

    .password-match.no-match {
      color: #ef4444;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <i class="fas fa-key"></i>
      </div>
      <h1 class="title">Cambiar Contraseña</h1>
      <p class="subtitle">
        Para cambiar tu contraseña, necesitas proporcionar tu email y contraseña actual
      </p>
    </div>

    <form id="change-password-form">
      <div class="form-group">
        <label class="form-label" for="email">
          <i class="fas fa-envelope"></i> Email
        </label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="current-password">
          <i class="fas fa-lock"></i> Contraseña Actual
        </label>
        <input
          id="current-password"
          type="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <div class="password-requirements">
        <strong><i class="fas fa-info-circle"></i> Requisitos de la nueva contraseña:</strong>
        <ul>
          <li>Mínimo 6 caracteres</li>
          <li>Se recomienda usar letras, números y símbolos</li>
        </ul>
      </div>

      <div class="form-group">
        <label class="form-label" for="new-password">
          <i class="fas fa-lock"></i> Nueva Contraseña
        </label>
        <input
          id="new-password"
          type="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="new-password"
        />
        <div class="password-strength">
          <div id="password-strength-bar" class="password-strength-bar"></div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm-password">
          <i class="fas fa-lock"></i> Confirmar Nueva Contraseña
        </label>
        <input
          id="confirm-password"
          type="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="new-password"
        />
        <div id="password-match" class="password-match"></div>
      </div>

      <button type="submit" class="btn-submit" id="submit-btn">
        <i class="fas fa-check-circle"></i>
        <span>Cambiar Contraseña</span>
      </button>
    </form>

    <div class="back-link">
      <a href="/login">
        <i class="fas fa-arrow-left"></i>
        Volver al Login
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script>
    const form = document.getElementById('change-password-form')
    const submitBtn = document.getElementById('submit-btn')
    const emailInput = document.getElementById('email')
    const currentPasswordInput = document.getElementById('current-password')
    const newPasswordInput = document.getElementById('new-password')
    const confirmPasswordInput = document.getElementById('confirm-password')
    const strengthBar = document.getElementById('password-strength-bar')
    const matchIndicator = document.getElementById('password-match')

    function showNotification(message, type = 'success') {
      const notification = document.createElement('div')
      notification.className = `notification ${type}`
      notification.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        <span>${message}</span>
      `
      document.body.appendChild(notification)

      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease-out reverse'
        setTimeout(() => notification.remove(), 300)
      }, 4000)
    }

    // Password strength checker
    newPasswordInput.addEventListener('input', () => {
      const password = newPasswordInput.value
      let strength = 0

      if (password.length >= 6) strength++
      if (password.length >= 10) strength++
      if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++
      if (/\d/.test(password)) strength++
      if (/[^a-zA-Z0-9]/.test(password)) strength++

      strengthBar.className = 'password-strength-bar'
      
      if (strength <= 2) {
        strengthBar.classList.add('strength-weak')
      } else if (strength <= 4) {
        strengthBar.classList.add('strength-medium')
      } else {
        strengthBar.classList.add('strength-strong')
      }

      checkPasswordMatch()
    })

    // Password match checker
    confirmPasswordInput.addEventListener('input', checkPasswordMatch)

    function checkPasswordMatch() {
      const newPassword = newPasswordInput.value
      const confirmPassword = confirmPasswordInput.value

      if (confirmPassword === '') {
        matchIndicator.innerHTML = ''
        return
      }

      if (newPassword === confirmPassword) {
        matchIndicator.className = 'password-match match'
        matchIndicator.innerHTML = `
          <i class="fas fa-check-circle"></i>
          <span>Las contraseñas coinciden</span>
        `
      } else {
        matchIndicator.className = 'password-match no-match'
        matchIndicator.innerHTML = `
          <i class="fas fa-times-circle"></i>
          <span>Las contraseñas no coinciden</span>
        `
      }
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = emailInput.value.trim()
      const currentPassword = currentPasswordInput.value
      const newPassword = newPasswordInput.value
      const confirmPassword = confirmPasswordInput.value

      // Validations
      if (!email || !currentPassword || !newPassword || !confirmPassword) {
        showNotification('Por favor completa todos los campos', 'error')
        return
      }

      // Email validation
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/
      if (!emailRegex.test(email)) {
        showNotification('Por favor ingresa un email válido', 'error')
        return
      }

      // Password length
      if (newPassword.length < 6) {
        showNotification('La nueva contraseña debe tener al menos 6 caracteres', 'error')
        return
      }

      // Password match
      if (newPassword !== confirmPassword) {
        showNotification('Las contraseñas no coinciden', 'error')
        return
      }

      // Same password check
      if (currentPassword === newPassword) {
        showNotification('La nueva contraseña debe ser diferente a la actual', 'error')
        return
      }

      // Disable button and show loading
      submitBtn.disabled = true
      submitBtn.innerHTML = `
        <div class="loading-spinner"></div>
        <span>Cambiando contraseña...</span>
      `

      try {
        const response = await axios.post('/api/auth/change-password', {
          email,
          currentPassword,
          newPassword
        })

        if (response.data.success) {
          showNotification('¡Contraseña cambiada exitosamente!', 'success')
          
          // Clear form
          form.reset()
          strengthBar.className = 'password-strength-bar'
          matchIndicator.innerHTML = ''

          // Redirect to login after 2 seconds
          setTimeout(() => {
            window.location.href = '/login'
          }, 2000)
        } else {
          showNotification(response.data.message || 'Error al cambiar la contraseña', 'error')
          
          // Restore button
          submitBtn.disabled = false
          submitBtn.innerHTML = `
            <i class="fas fa-check-circle"></i>
            <span>Cambiar Contraseña</span>
          `
        }
      } catch (error) {
        console.error('Error changing password:', error)
        const message = error.response?.data?.message || 'Error al cambiar la contraseña'
        showNotification(message, 'error')
        
        // Restore button
        submitBtn.disabled = false
        submitBtn.innerHTML = `
          <i class="fas fa-check-circle"></i>
          <span>Cambiar Contraseña</span>
        `
      }
    })

    // Auto-fill email if user is logged in
    const catalogUser = localStorage.getItem('catalog_user')
    if (catalogUser) {
      try {
        const user = JSON.parse(catalogUser)
        if (user.email) {
          emailInput.value = user.email
        }
      } catch (e) {
        // Ignore
      }
    }
  </script>
</body>
</html>
