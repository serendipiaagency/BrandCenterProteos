<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Brand Portal Catalog</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 420px;
      width: 100%;
      padding: 40px;
    }

    .login-header {
      text-align: center;
      margin-bottom: 30px;
    }

    .login-logo {
      font-size: 3rem;
      color: #667eea;
      margin-bottom: 1rem;
    }

    .login-title {
      font-size: 1.75rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 0.5rem;
    }

    .login-subtitle {
      font-size: 0.875rem;
      color: #6b7280;
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.5rem;
    }

    .form-input {
      width: 100%;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      border: 2px solid #e5e7eb;
      border-radius: 8px;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .btn-login {
      width: 100%;
      padding: 0.875rem;
      font-size: 1rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-login:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .notification {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 1rem 1.5rem;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      z-index: 1000;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .notification.success {
      background: #10b981;
      color: white;
    }

    .notification.error {
      background: #ef4444;
      color: white;
    }

    .loading-spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .forgot-password {
      text-align: center;
      margin-top: 1rem;
    }

    .forgot-password a {
      color: #667eea;
      text-decoration: none;
      font-size: 0.875rem;
      font-weight: 500;
      transition: color 0.2s;
    }

    .forgot-password a:hover {
      color: #764ba2;
      text-decoration: underline;
    }

    .divider {
      margin: 1.5rem 0;
      text-align: center;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: #e5e7eb;
    }

    .divider span {
      position: relative;
      background: white;
      padding: 0 1rem;
      color: #6b7280;
      font-size: 0.875rem;
    }

    .admin-link {
      text-align: center;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid #e5e7eb;
    }

    .admin-link a {
      color: #6b7280;
      text-decoration: none;
      font-size: 0.875rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    .admin-link a:hover {
      color: #667eea;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="login-header">
      <div class="login-logo">
        <i class="fas fa-cube"></i>
      </div>
      <h1 class="login-title">Catálogo de Marcas</h1>
      <p class="login-subtitle">Proteos Biotech Asset Management</p>
    </div>

    <form id="login-form">
      <div class="form-group">
        <label class="form-label" for="email">
          <i class="fas fa-envelope"></i> Email
        </label>
        <input
          id="email"
          type="email"
          class="form-input"
          placeholder="tu@email.com"
          required
          autocomplete="email"
        />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">
          <i class="fas fa-lock"></i> Contraseña
        </label>
        <input
          id="password"
          type="password"
          class="form-input"
          placeholder="••••••••"
          required
          autocomplete="current-password"
        />
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <i class="fas fa-sign-in-alt"></i>
        <span>Iniciar Sesión</span>
      </button>

      <div class="forgot-password">
        <a href="/" onclick="alert('Por favor contacta al administrador para recuperar tu contraseña.'); return false;">
          <i class="fas fa-key"></i> ¿Olvidaste tu contraseña?
        </a>
      </div>
    </form>

    <div class="admin-link">
      <a href="/admin">
        <i class="fas fa-user-shield"></i>
        ¿Eres administrador? Accede aquí
      </a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/axios@1.6.0/dist/axios.min.js"></script>
  <script>
    const form = document.getElementById('login-form')
    const loginBtn = document.getElementById('login-btn')
    const emailInput = document.getElementById('email')
    const passwordInput = document.getElementById('password')

    function showNotification(message, type = 'success') {
      const notification = document.createElement('div')
      notification.className = `notification ${type}`
      notification.innerHTML = `
        <i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i>
        ${message}
      `
      document.body.appendChild(notification)

      setTimeout(() => {
        notification.style.animation = 'slideIn 0.3s ease-out reverse'
        setTimeout(() => notification.remove(), 300)
      }, 3000)
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault()

      const email = emailInput.value.trim()
      const password = passwordInput.value

      if (!email || !password) {
        showNotification('Por favor completa todos los campos', 'error')
        return
      }

      // Disable button and show loading
      loginBtn.disabled = true
      loginBtn.innerHTML = `
        <div class="loading-spinner"></div>
        <span>Iniciando sesión...</span>
      `

      try {
        const response = await axios.post('/api/public/login', {
          email,
          password
        })

        if (response.data.success) {
          // Save token and user info
          const { token, user } = response.data

          localStorage.setItem('catalog_token', token)
          localStorage.setItem('catalog_user', JSON.stringify(user))

          showNotification('¡Inicio de sesión exitoso!', 'success')

          // Redirect based on role
          setTimeout(() => {
            if (user.role === 'admin' || user.role === 'marketing') {
              window.location.href = '/admin'
            } else {
              window.location.href = '/catalog'
            }
          }, 500)
        } else {
          showNotification(response.data.message || 'Credenciales inválidas', 'error')
          loginBtn.disabled = false
          loginBtn.innerHTML = `
            <i class="fas fa-sign-in-alt"></i>
            <span>Iniciar Sesión</span>
          `
        }
      } catch (error) {
        console.error('Login error:', error)
        showNotification('Error al iniciar sesión. Por favor intenta de nuevo.', 'error')
        loginBtn.disabled = false
        loginBtn.innerHTML = `
          <i class="fas fa-sign-in-alt"></i>
          <span>Iniciar Sesión</span>
        `
      }
    })

    // Check if already logged in
    const token = localStorage.getItem('catalog_token')
    if (token) {
      axios.post('/api/public/verify-token', { token })
        .then(response => {
          if (response.data.valid) {
            const user = JSON.parse(localStorage.getItem('catalog_user') || '{}')
            if (user.role === 'admin' || user.role === 'marketing') {
              window.location.href = '/admin'
            } else {
              window.location.href = '/catalog'
            }
          }
        })
        .catch(() => {
          // Token invalid, stay on login page
          localStorage.removeItem('catalog_token')
          localStorage.removeItem('catalog_user')
        })
    }
  </script>
</body>
</html>
